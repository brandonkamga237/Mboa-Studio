<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: var(--bg-page); font-family: var(--font-body); }
  .row { display: flex; gap: 12px; flex-wrap: wrap; }
  .card {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; border-radius: var(--radius-lg);
    border-left: 4px solid; min-width: 180px;
  }
  .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .info { display: flex; flex-direction: column; gap: 2px; }
  .label { font-size: 13px; font-weight: 600; }
  .sub   { font-size: 11px; opacity: 0.7; font-family: var(--font-mono); }
  .pill {
    display: inline-block; padding: 2px 10px; border-radius: var(--radius-pill);
    font-size: 11px; font-weight: 600; margin-top: 4px;
  }
</style>
</head>
<body>
<div class="row">
  <div class="card" style="background:#F3F4F6; border-left-color:#9CA3AF;">
    <div class="dot" style="background:#9CA3AF"></div>
    <div class="info">
      <span class="label" style="color:#6B7280">Créé</span>
      <span class="sub">--status-draft</span>
      <span class="pill" style="background:#E5E7EB; color:#6B7280">Brouillon</span>
    </div>
  </div>
  <div class="card" style="background:#FFFBEB; border-left-color:#D97706;">
    <div class="dot" style="background:#D97706"></div>
    <div class="info">
      <span class="label" style="color:#92400E">Candidat final</span>
      <span class="sub">--status-candidate</span>
      <span class="pill" style="background:#FDE68A; color:#92400E">Candidat final</span>
    </div>
  </div>
  <div class="card" style="background:#F0FDF4; border-left-color:#15803D;">
    <div class="dot" style="background:#15803D"></div>
    <div class="info">
      <span class="label" style="color:#14532D">Officiel</span>
      <span class="sub">--status-official</span>
      <span class="pill" style="background:#BBF7D0; color:#14532D">Officiel</span>
    </div>
  </div>
  <div class="card" style="background:#F9FAFB; border-left-color:#D1D5DB;">
    <div class="dot" style="background:#D1D5DB"></div>
    <div class="info">
      <span class="label" style="color:#9CA3AF">Archivé</span>
      <span class="sub">--status-archived</span>
      <span class="pill" style="background:#F3F4F6; color:#9CA3AF">Archivé</span>
    </div>
  </div>
</div>
</body>
</html>
