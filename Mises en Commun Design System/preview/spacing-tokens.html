<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: var(--bg-page); font-family: var(--font-body); }
  .row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .block { background: var(--brand-navy); opacity: 0.15; border-radius: 2px; height: 20px; }
  .label { font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted); min-width: 60px; }
  .val   { font-size: 11px; color: var(--fg-secondary); }
</style>
</head>
<body>
  <div class="row"><span class="label">--space-1</span><div class="block" style="width:4px;opacity:1;background:var(--brand-navy)"></div><span class="val">4px</span></div>
  <div class="row"><span class="label">--space-2</span><div class="block" style="width:8px;opacity:1;background:var(--brand-navy)"></div><span class="val">8px</span></div>
  <div class="row"><span class="label">--space-3</span><div class="block" style="width:12px;opacity:1;background:var(--brand-navy)"></div><span class="val">12px</span></div>
  <div class="row"><span class="label">--space-4</span><div class="block" style="width:16px;opacity:1;background:var(--brand-navy)"></div><span class="val">16px</span></div>
  <div class="row"><span class="label">--space-5</span><div class="block" style="width:20px;opacity:1;background:var(--brand-navy)"></div><span class="val">20px</span></div>
  <div class="row"><span class="label">--space-6</span><div class="block" style="width:24px;opacity:1;background:var(--brand-navy)"></div><span class="val">24px</span></div>
  <div class="row"><span class="label">--space-8</span><div class="block" style="width:32px;opacity:1;background:var(--brand-blue)"></div><span class="val">32px</span></div>
  <div class="row"><span class="label">--space-10</span><div class="block" style="width:40px;opacity:1;background:var(--brand-blue)"></div><span class="val">40px</span></div>
  <div class="row"><span class="label">--space-12</span><div class="block" style="width:48px;opacity:1;background:var(--brand-blue)"></div><span class="val">48px</span></div>
  <div class="row"><span class="label">--space-16</span><div class="block" style="width:64px;opacity:1;background:var(--brand-blue-light)"></div><span class="val">64px</span></div>
</body>
</html>
