<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--bg-card); font-family: var(--font-body); }
  .stack { display: flex; flex-direction: column; gap: 8px; }
  .row { display: flex; align-items: baseline; gap: 16px; padding: 4px 0; border-bottom: 1px solid var(--border-subtle); }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted); min-width: 100px; flex-shrink: 0; }
</style>
</head>
<body>
<div class="stack">
  <div class="row">
    <span class="meta">display / 36px</span>
    <span style="font-family:var(--font-display);font-size:36px;font-weight:700;color:var(--fg-primary);line-height:1.25">Mises en Commun</span>
  </div>
  <div class="row">
    <span class="meta">h1 / 30px</span>
    <span style="font-family:var(--font-display);font-size:30px;font-weight:600;color:var(--fg-primary);line-height:1.25">Tableau de bord</span>
  </div>
  <div class="row">
    <span class="meta">h2 / 24px</span>
    <span style="font-family:var(--font-display);font-size:24px;font-weight:600;color:var(--fg-primary);line-height:1.375">Brouillon de Marie</span>
  </div>
  <div class="row">
    <span class="meta">h3 / 18px</span>
    <span style="font-family:var(--font-body);font-size:18px;font-weight:600;color:var(--fg-primary);line-height:1.375">Dimanche 9 novembre 2025</span>
  </div>
  <div class="row">
    <span class="meta">label / 13px</span>
    <span style="font-family:var(--font-body);font-size:13px;font-weight:600;color:var(--fg-secondary);letter-spacing:0.04em;text-transform:uppercase">Brouillon officiel</span>
  </div>
</div>
</body>
</html>
