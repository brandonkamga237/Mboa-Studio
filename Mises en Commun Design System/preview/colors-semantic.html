<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: var(--bg-page); font-family: var(--font-body); }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .token { display: flex; flex-direction: column; gap: 4px; }
  .chip { height: 40px; border-radius: var(--radius-md); border: 1px solid rgba(0,0,0,0.06); display: flex; align-items: center; padding: 0 10px; }
  .name { font-size: 10px; font-weight: 600; color: var(--fg-secondary); font-family: var(--font-mono); }
  .sample { font-size: 12px; }
</style>
</head>
<body>
<div class="grid">
  <div class="token"><div class="chip" style="background:#1E2D4A"><span style="color:#FDFAF7;font-size:11px;font-family:var(--font-body)">Texte principal</span></div><span class="name">--fg-primary</span></div>
  <div class="token"><div class="chip" style="background:#F7F3EE"><span style="color:#4B5563;font-size:11px;font-family:var(--font-body)">Secondaire</span></div><span class="name">--fg-secondary</span></div>
  <div class="token"><div class="chip" style="background:#F7F3EE; border: 1px solid #E8E2D9;"><span style="color:#9CA3AF;font-size:11px;font-family:var(--font-body)">Métadonnée</span></div><span class="name">--fg-muted</span></div>
  <div class="token"><div class="chip" style="background:#2B4C7E"><span style="color:#FDFAF7;font-size:11px;font-family:var(--font-body)">Lien</span></div><span class="name">--fg-link</span></div>

  <div class="token"><div class="chip" style="background:#F7F3EE; border: 1px solid #E8E2D9;"></div><span class="name">--bg-page</span></div>
  <div class="token"><div class="chip" style="background:#FDFAF7; border: 1px solid #E8E2D9;"></div><span class="name">--bg-card</span></div>
  <div class="token"><div class="chip" style="background:#1E2D4A"></div><span class="name">--bg-sidebar</span></div>
  <div class="token"><div class="chip" style="background:#FFFFFF; border: 1px solid #E8E2D9;"></div><span class="name">--bg-input</span></div>

  <div class="token"><div class="chip" style="background:#E8E2D9"></div><span class="name">--border-subtle</span></div>
  <div class="token"><div class="chip" style="background:#D1C9BE"></div><span class="name">--border-medium</span></div>
  <div class="token"><div class="chip" style="background:#9CA3AF"></div><span class="name">--border-strong</span></div>
  <div class="token"><div class="chip" style="background:#2B4C7E"></div><span class="name">--border-focus</span></div>
</div>
</body>
</html>
