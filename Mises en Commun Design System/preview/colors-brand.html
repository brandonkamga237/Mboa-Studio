<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: var(--bg-page); font-family: var(--font-body); }
  .row { display: flex; gap: 10px; flex-wrap: wrap; }
  .swatch { display: flex; flex-direction: column; gap: 6px; }
  .chip { width: 80px; height: 56px; border-radius: var(--radius-lg); border: 1px solid rgba(0,0,0,0.07); }
  .name { font-size: 11px; font-weight: 600; color: var(--fg-secondary); }
  .val  { font-size: 10px; color: var(--fg-muted); font-family: var(--font-mono); }
</style>
</head>
<body>
<div class="row">
  <div class="swatch"><div class="chip" style="background:#1E2D4A"></div><span class="name">Navy</span><span class="val">#1E2D4A</span></div>
  <div class="swatch"><div class="chip" style="background:#2B3F62"></div><span class="name">Navy Light</span><span class="val">#2B3F62</span></div>
  <div class="swatch"><div class="chip" style="background:#141E33"></div><span class="name">Navy Deep</span><span class="val">#141E33</span></div>
  <div class="swatch"><div class="chip" style="background:#2B4C7E"></div><span class="name">Blue</span><span class="val">#2B4C7E</span></div>
  <div class="swatch"><div class="chip" style="background:#3D6399"></div><span class="name">Blue Light</span><span class="val">#3D6399</span></div>
  <div class="swatch"><div class="chip" style="background:#C9952A"></div><span class="name">Gold</span><span class="val">#C9952A</span></div>
  <div class="swatch"><div class="chip" style="background:#DDB04A"></div><span class="name">Gold Light</span><span class="val">#DDB04A</span></div>
  <div class="swatch"><div class="chip" style="background:#F5E9C8; border: 1px solid #E8E2D9;"></div><span class="name">Gold Pale</span><span class="val">#F5E9C8</span></div>
  <div class="swatch"><div class="chip" style="background:#F7F3EE; border: 1px solid #E8E2D9;"></div><span class="name">Cream</span><span class="val">#F7F3EE</span></div>
  <div class="swatch"><div class="chip" style="background:#FDFAF7; border: 1px solid #E8E2D9;"></div><span class="name">Warm White</span><span class="val">#FDFAF7</span></div>
  <div class="swatch"><div class="chip" style="background:#E8E2D9"></div><span class="name">Stone</span><span class="val">#E8E2D9</span></div>
  <div class="swatch"><div class="chip" style="background:#D1C9BE"></div><span class="name">Stone Dark</span><span class="val">#D1C9BE</span></div>
</div>
</body>
</html>
