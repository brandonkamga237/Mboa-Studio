<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: var(--bg-page); font-family: var(--font-body); }
  .row { display: flex; align-items: center; gap: 12px; margin-bottom: 6px; }
  .bar { background: var(--brand-navy); border-radius: 2px; height: 6px; }
  .size-label { font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted); min-width: 36px; }
  .sample { color: var(--fg-primary); font-family: var(--font-body); }
</style>
</head>
<body>
  <div class="row"><span class="size-label">36px</span><div class="bar" style="width:180px"></div><span class="sample" style="font-size:36px;line-height:1">Aa</span></div>
  <div class="row"><span class="size-label">30px</span><div class="bar" style="width:150px"></div><span class="sample" style="font-size:30px;line-height:1">Aa</span></div>
  <div class="row"><span class="size-label">24px</span><div class="bar" style="width:120px"></div><span class="sample" style="font-size:24px;line-height:1">Aa</span></div>
  <div class="row"><span class="size-label">20px</span><div class="bar" style="width:100px"></div><span class="sample" style="font-size:20px;line-height:1">Aa</span></div>
  <div class="row"><span class="size-label">18px</span><div class="bar" style="width:90px"></div><span class="sample" style="font-size:18px;line-height:1">Aa</span></div>
  <div class="row"><span class="size-label">16px</span><div class="bar" style="width:80px"></div><span class="sample" style="font-size:16px;line-height:1">Aa</span></div>
  <div class="row"><span class="size-label">15px</span><div class="bar" style="width:75px"></div><span class="sample" style="font-size:15px;line-height:1">Aa</span></div>
  <div class="row"><span class="size-label">13px</span><div class="bar" style="width:65px"></div><span class="sample" style="font-size:13px;line-height:1">Aa</span></div>
  <div class="row"><span class="size-label">11px</span><div class="bar" style="width:55px"></div><span class="sample" style="font-size:11px;line-height:1">Aa</span></div>
</body>
</html>
